name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # The API integration tests skip themselves without a database, so CI runs a
    # real Postgres — otherwise auth and ownership regressions would slip through
    # a green build.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bidwright
          POSTGRES_PASSWORD: bidwright
          POSTGRES_DB: bidwright
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U bidwright"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://bidwright:bidwright@localhost:5433/bidwright
      JWT_SECRET: ci-only-secret-min-32-chars-1234567890

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

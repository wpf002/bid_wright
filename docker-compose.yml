services:
  postgres:
    image: postgres:16-alpine
    container_name: bidwright-postgres
    environment:
      POSTGRES_USER: bidwright
      POSTGRES_PASSWORD: bidwright
      POSTGRES_DB: bidwright
    # Host port 5433: 5432 is taken by another project's Postgres.
    ports:
      - "5433:5432"
    volumes:
      - bidwright_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidwright"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bidwright_pgdata:
